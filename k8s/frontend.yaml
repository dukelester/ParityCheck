apiVersion: apps/v1
kind: Deployment
metadata:
  name: paritycheck-frontend
  namespace: paritycheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paritycheck-frontend
  template:
    metadata:
      labels:
        app: paritycheck-frontend
    spec:
      containers:
        - name: frontend
          image: paritycheck/frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: paritycheck-frontend
  namespace: paritycheck
spec:
  selector:
    app: paritycheck-frontend
  ports:
    - port: 80
      targetPort: 80
