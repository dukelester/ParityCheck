services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paritycheck
      POSTGRES_PASSWORD: paritycheck_dev
      POSTGRES_DB: paritycheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paritycheck"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://paritycheck:paritycheck_dev@postgres:5432/paritycheck
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker -l info
    environment:
      DATABASE_URL: postgresql://paritycheck:paritycheck_dev@postgres:5432/paritycheck
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
