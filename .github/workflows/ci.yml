name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CLI
        run: |
          cd cli && pip install -e ".[dev]"
      - name: Run CLI tests
        run: |
          cd cli && python -m pytest tests/ -v

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paritycheck
          POSTGRES_PASSWORD: paritycheck
          POSTGRES_DB: paritycheck
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          cd backend && pip install -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests
        run: |
          cd backend && python -m pytest -v
        env:
          DATABASE_URL: postgresql://paritycheck:paritycheck@localhost:5432/paritycheck
          SECRET_KEY: test-secret
          TESTING: "1"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Deploy frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist


  docker:
    runs-on: ubuntu-latest
    needs: [cli, backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t paritycheck/backend:test ./backend
      - name: Build frontend image
        run: docker build -t paritycheck/frontend:test ./frontend

  deploy-pages:
    runs-on: ubuntu-latest
    needs: frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4